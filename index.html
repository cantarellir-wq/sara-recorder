<!DOCTYPE html>
<html lang="it">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="theme-color" content="#E8664B">
 <title>Sara Registratore Vocale</title>

 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
 background: linear-gradient(135deg, #fafaf8 0%, #f5f1ed 100%);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }

 .container { max-width: 400px; width: 100%; text-align: center; }

 .header { margin-bottom: 40px; }
 .header h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
 .header p { font-size: 14px; color: #666; }
 .header .educator-badge {
 display: inline-block;
 margin-top: 10px;
 padding: 4px 12px;
 background: rgba(232, 102, 75, 0.1);
 border-radius: 20px;
 font-size: 13px;
 color: #E8664B;
 font-weight: 500;
 }

 .record-section { margin-bottom: 32px; }

 .btn-record {
 width: 160px;
 height: 160px;
 border-radius: 50%;
 border: none;
 background: #E8664B;
 color: white;
 font-size: 56px;
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 margin: 0 auto;
 transition: all 0.3s;
 box-shadow: 0 4px 16px rgba(232, 102, 75, 0.25);
 }
 .btn-record:disabled { opacity: 0.4; cursor: not-allowed; }
 .btn-record.recording {
 width: 140px; height: 140px;
 box-shadow: 0 8px 24px rgba(232, 102, 75, 0.4), 0 0 0 12px rgba(232, 102, 75, 0.1);
 }

 .timer {
 margin-top: 24px;
 font-size: 32px;
 font-weight: 600;
 color: #E8664B;
 font-variant-numeric: tabular-nums;
 min-height: 40px;
 }

 .status {
 padding: 12px;
 background: rgba(74, 144, 226, 0.1);
 border-radius: 8px;
 font-size: 13px;
 color: #4A90E2;
 margin-bottom: 16px;
 font-weight: 500;
 display: none;
 }
 .status.visible { display: block; }
 .status.success { background: rgba(76, 175, 80, 0.12); color: #2e7d32; }

 .error {
 padding: 12px;
 background: rgba(232, 102, 75, 0.1);
 border-radius: 8px;
 font-size: 13px;
 color: #E8664B;
 margin-bottom: 16px;
 display: none;
 text-align: left;
 }
 .error.visible { display: block; }

 .warning {
 padding: 12px;
 background: rgba(255, 165, 0, 0.12);
 border-radius: 8px;
 font-size: 13px;
 color: #b36200;
 margin-bottom: 16px;
 text-align: left;
 }

 .instructions {
 padding: 20px;
 background: rgba(0, 0, 0, 0.02);
 border-radius: 8px;
 font-size: 13px;
 color: #666;
 line-height: 1.6;
 text-align: left;
 }
 .instructions strong { display: block; margin-bottom: 8px; color: #333; }
 .instructions ol { margin: 0; padding-left: 20px; }
 .instructions li { margin-bottom: 4px; }

 .footer { font-size: 12px; color: #999; margin-top: 32px; }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>Sara Registratore Vocale</h1>
 <p>Descrivi il momento mentre accade</p>
 <span class="educator-badge" id="educatorBadge"></span>
 </div>

 <div class="record-section">
 <button class="btn-record" id="recordBtn" onclick="toggleRecording()">
 <span id="recordIcon">🎤</span>
 </button>
 <div class="timer" id="timer"></div>
 </div>

 <div id="status" class="status"></div>
 <div id="error" class="error"></div>
 <div id="warning" class="warning" style="display:none"></div>

 <div class="instructions">
 <strong>Come usare:</strong>
 <ol>
 <li>Premi il pulsante rosso per avviare</li>
 <li>Descrivi quello che stai facendo con Sara</li>
 <li>Premi il quadrato per finire</li>
 <li>Il file si salva da solo — nient'altro da fare</li>
 </ol>
 </div>

 <p class="footer">Versione 5.1 · Sara Recorder</p>
 </div>
