<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sara Recorder</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f8; color: #1a2634; display: flex; flex-direction: column;
    align-items: center; min-height: 100vh; padding: 24px 16px;
  }
  h1 { font-size: 20px; margin: 8px 0 2px; }
  .id-chip {
    font-size: 14px; color: #556; background: #e4e9ee; padding: 4px 12px;
    border-radius: 20px; margin-bottom: 28px;
  }
  .id-chip.missing { background: #ffe0e0; color: #a00; }
  .rec-btn {
    width: 180px; height: 180px; border-radius: 50%; border: none;
    background: #2e7d32; color: #fff; font-size: 20px; font-weight: 600;
    cursor: pointer; box-shadow: 0 6px 18px rgba(0,0,0,.15);
    display: flex; align-items: center; justify-content: center; text-align: center;
    transition: background .2s, transform .1s; user-select: none;
  }
  .rec-btn:active { transform: scale(.97); }
  .rec-btn.recording { background: #c62828; }
  .rec-btn:disabled { background: #b0bac3; cursor: default; }
  .timer { font-size: 40px; font-variant-numeric: tabular-nums; margin: 24px 0 6px; letter-spacing: 1px; }
  .status { font-size: 15px; color: #445; min-height: 22px; text-align: center; }
  .status .warn { color: #c47f00; }
  .status .ok { color: #2e7d32; font-weight: 600; }
  .tips { margin-top: 34px; font-size: 13px; color: #78838d; max-width: 320px; text-align: center; line-height: 1.5; }
  .err { color: #c62828; margin-top: 20px; text-align: center; max-width: 320px; }
</style>
</head>
<body>
  <h1>Sara Recorder</h1>
  <div id="idChip" class="id-chip">educatore: —</div>

  <button id="recBtn" class="rec-btn">Avvia<br>registrazione</button>

  <div class="timer" id="timer">00:00</div>
  <div class="status" id="status"></div>

  <div class="tips">
    Parla in diretta descrivendo quello che fai con Sara.<br>
    Tieni l'app aperta durante la registrazione.
  </div>
  <div class="err" id="err"></div>

<script>
// ===================== CONFIGURAZIONE =====================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAVAacfv98qSQytj66RceqrePBnEuCXTC2e_YGDvM-Facg7S9cDkPPD5F4a0g0koAQ/exec';
const SHARED_SECRET   = 'sara2026';
const SEGMENT_MS      = 3 * 60 * 1000;   // durata di ogni pezzo: 3 minuti
// =========================================================

// --- Identità educatore dall'URL (?id=nome) ---
const params = new URLSearchParams(location.search);
const rawId = params.get('id') || '';
const eduId = rawId.replace(/[^A-Za-z0-9_-]/g, '');

const recBtn = document.getElementById('recBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const errEl = document.getElementById('err');
const idChip = document.getElementById('idChip');

if (eduId) {
  idChip.textContent = 'educatore: ' + eduId;
} else {
  idChip.textContent = 'educatore mancante nel link!';
  idChip.classList.add('missing');
  recBtn.disabled = true;
  errEl.textContent = 'Il link non contiene ?id=nome. Chiedi a Mary il link corretto.';
}

// --- Stato sessione ---
let stream = null;
let sessionMime = '';
let sessionExt = 'webm';
let sessionPrefix = '';
let partNum = 0;
let recording = false;
let currentRecorder = null;
let currentChunks = [];
let rotateTimer = null;
let sessionStart = 0;
let clockTimer = null;
let wakeLock = null;

// --- Coda di upload (si svuota da sola in sottofondo) ---
let uploadQueue = [];   // {blob, fileName, attempts, status}
let savedCount = 0;
let processing = false;

// ===================== AVVIO / STOP =====================
recBtn.addEventListener('click', () => {
  if (!recording) startSession();
  else stopSession();
});

async function startSession() {
  errEl.textContent = '';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    errEl.textContent = 'Impossibile accedere al microfono. Controlla i permessi del browser.';
    return;
  }

  sessionMime = pickMime(stream);
  sessionExt = extFor(sessionMime);
  sessionPrefix = 'Sara_' + timestamp() + '_' + eduId;
  partNum = 0;
  savedCount = 0;
  uploadQueue = [];
  recording = true;
  sessionStart = Date.now();

  recBtn.textContent = 'Stop';
  recBtn.classList.add('recording');
  clockTimer = setInterval(updateClock, 500);
  requestWakeLock();
  startSegment();
  updateStatus();
}

function stopSession() {
  recording = false;
  clearTimeout(rotateTimer);
  clearInterval(clockTimer);
  if (currentRecorder && currentRecorder.state === 'recording') {
    currentRecorder.stop();   // l'ultimo pezzo (anche corto) finisce in coda
  }
  releaseWakeLock();
  recBtn.textContent = 'Avvia\nregistrazione';
  recBtn.classList.remove('recording');
  recBtn.style.whiteSpace = 'pre-line';
  updateStatus();
}

// ===================== SEGMENTAZIONE =====================
function startSegment() {
  partNum++;
  const thisPart = partNum;
  currentChunks = [];
  currentRecorder = new MediaRecorder(stream, sessionMime ? { mimeType: sessionMime } : {});

  currentRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) currentChunks.push(e.data);
  };
  currentRecorder.onstop = () => {
    const chunks = currentChunks;
    // riparto SUBITO col pezzo successivo (se ancora in registrazione) per ridurre il buco
    if (recording) startSegment();
    // poi metto in coda il pezzo appena chiuso
    if (chunks.length) {
      const blob = new Blob(chunks, { type: sessionMime });
      enqueue(blob, thisPart);
    }
  };

  currentRecorder.start();   // niente timeslice: un solo blob per pezzo, pulito
  rotateTimer = setTimeout(() => {
    if (currentRecorder && currentRecorder.state === 'recording') currentRecorder.stop();
  }, SEGMENT_MS);
}

// ===================== CODA DI UPLOAD =====================
function enqueue(blob, part) {
  const fileName = sessionPrefix + '_part' + String(part).padStart(2, '0') + '.' + sessionExt;
  uploadQueue.push({ blob, fileName, attempts: 0, status: 'pending' });
  updateStatus();
  processQueue();
}

async function processQueue() {
  if (processing) return;
  processing = true;
  try {
    while (true) {
      const item = uploadQueue.find(i => i.status === 'pending' || i.status === 'retry');
      if (!item) break;
      item.status = 'uploading';
      updateStatus();
      try {
        const b64 = await blobToBase64(item.blob);
        await uploadOne(item.fileName, sessionMime, b64);
        // salvato: lo tolgo dalla coda e libero memoria
        const idx = uploadQueue.indexOf(item);
        if (idx > -1) uploadQueue.splice(idx, 1);
        item.blob = null;
        savedCount++;
        updateStatus();
      } catch (err) {
        item.attempts++;
        item.status = 'retry';
        // sposto in fondo così anche gli altri pezzi hanno il loro turno
        const idx = uploadQueue.indexOf(item);
        if (idx > -1) { uploadQueue.splice(idx, 1); uploadQueue.push(item); }
        updateStatus();
        await sleep(Math.min(3000 * item.attempts, 30000)); // attesa crescente, max 30s
      }
    }
  } finally {
    processing = false;
  }
}

async function uploadOne(fileName, mimeType, base64) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    // text/plain evita il preflight CORS che Apps Script non gestisce
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ secret: SHARED_SECRET, fileName, mimeType, fileData: base64 }),
    redirect: 'follow'
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'upload fallito');
  return json;
}

// ===================== UTILITÀ =====================
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1]);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(blob);
  });
}

function pickMime(strm) {
  const cands = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/mp4;codecs=mp4a.40.2'];
  for (const c of cands) {
    try { if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; } catch (e) {}
  }
  try { return new MediaRecorder(strm).mimeType || ''; } catch (e) { return ''; }
}

function extFor(m) {
  m = (m || '').toLowerCase();
  if (m.includes('webm')) return 'webm';
  if (m.includes('ogg')) return 'ogg';
  if (m.includes('mp4') || m.includes('m4a') || m.includes('aac') || m.includes('mpeg')) return 'm4a';
  return 'webm';
}

function timestamp() {
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return '' + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + '_' +
         p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateClock() {
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(s / 60), sec = s % 60;
  timerEl.textContent = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function updateStatus() {
  const pending = uploadQueue.length;
  let html = savedCount + ' ' + (savedCount === 1 ? 'pezzo salvato' : 'pezzi salvati');
  if (pending > 0) {
    html += ' &middot; <span class="warn">' + pending + ' in attesa (riprovo da solo…)</span>';
  } else if (!recording && savedCount > 0) {
    html = '<span class="ok">Tutto salvato ✓ (' + savedCount + ' pezzi)</span>';
  }
  statusEl.innerHTML = recording || savedCount > 0 || pending > 0 ? html : '';
}

// ===================== SCHERMO SVEGLIO =====================
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
function releaseWakeLock() {
  try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && recording) requestWakeLock();
});

// ===================== PROTEZIONE CHIUSURA =====================
window.addEventListener('beforeunload', (e) => {
  if (recording || uploadQueue.length > 0) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
</html>
