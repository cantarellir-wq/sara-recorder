<!DOCTYPE html>
<html lang="it">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="theme-color" content="#E8664B">
 <title>Sara Registratore Vocale</title>

 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
 background: linear-gradient(135deg, #fafaf8 0%, #f5f1ed 100%);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }

 .container { max-width: 400px; width: 100%; text-align: center; }

 .header { margin-bottom: 40px; }
 .header h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
 .header p { font-size: 14px; color: #666; }
 .header .educator-badge {
 display: inline-block;
 margin-top: 10px;
 padding: 4px 12px;
 background: rgba(232, 102, 75, 0.1);
 border-radius: 20px;
 font-size: 13px;
 color: #E8664B;
 font-weight: 500;
 }

 .tips {
 margin-bottom: 32px;
 padding: 16px;
 background: rgba(232, 102, 75, 0.08);
 border-left: 4px solid #E8664B;
 border-radius: 6px;
 text-align: left;
 font-size: 13px;
 color: #333;
 line-height: 1.6;
 }
 .tips strong { display: block; margin-bottom: 10px; color: #E8664B; font-weight: 600; }
 .tips ol { margin: 0; padding-left: 20px; }
 .tips li { margin-bottom: 6px; }

 .record-section { margin-bottom: 32px; }

 .btn-record {
 width: 160px;
 height: 160px;
 border-radius: 50%;
 border: none;
 background: #E8664B;
 color: white;
 font-size: 56px;
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 margin: 0 auto;
 transition: all 0.3s;
 box-shadow: 0 4px 16px rgba(232, 102, 75, 0.25);
 }
 .btn-record:disabled { opacity: 0.4; cursor: not-allowed; }
 .btn-record.recording {
 width: 140px; height: 140px;
 box-shadow: 0 8px 24px rgba(232, 102, 75, 0.4), 0 0 0 12px rgba(232, 102, 75, 0.1);
 }

 .timer {
 margin-top: 24px;
 font-size: 32px;
 font-weight: 600;
 color: #E8664B;
 font-variant-numeric: tabular-nums;
 min-height: 40px;
 }

 .status {
 padding: 12px;
 background: rgba(74, 144, 226, 0.1);
 border-radius: 8px;
 font-size: 13px;
 color: #4A90E2;
 margin-bottom: 16px;
 font-weight: 500;
 display: none;
 }
 .status.visible { display: block; }
 .status.success { background: rgba(76, 175, 80, 0.12); color: #2e7d32; }
 .status.warning { background: rgba(255, 165, 0, 0.12); color: #b36200; }

 .error {
 padding: 12px;
 background: rgba(232, 102, 75, 0.1);
 border-radius: 8px;
 font-size: 13px;
 color: #E8664B;
 margin-bottom: 16px;
 display: none;
 text-align: left;
 }
 .error.visible { display: block; }

 .retry-btn {
 margin-top: 8px;
 padding: 8px 16px;
 background: #E8664B;
 color: white;
 border: none;
 border-radius: 6px;
 font-size: 13px;
 cursor: pointer;
 font-weight: 500;
 }
 .retry-btn:hover { background: #d45536; }

 .warning {
 padding: 12px;
 background: rgba(255, 165, 0, 0.12);
 border-radius: 8px;
 font-size: 13px;
 color: #b36200;
 margin-bottom: 16px;
 text-align: left;
 }

 .footer { font-size: 12px; color: #999; margin-top: 32px; }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>Sara Registratore
